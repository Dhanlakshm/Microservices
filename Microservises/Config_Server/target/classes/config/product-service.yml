spring:
  application:
    name: product-service
server:
  port: 9991
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:9999/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
          show-details: always