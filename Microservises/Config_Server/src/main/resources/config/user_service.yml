spring:
  application:
    name: user_service
  boot:
    admin:
          client:
            url: http://localhost:3333

server:
  port: 9990

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:9999/eureka/
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
          show-details: always