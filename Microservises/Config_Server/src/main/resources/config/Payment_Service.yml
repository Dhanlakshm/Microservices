spring:
  application:
    name: Payment_Service
  boot:
    admin:
          client:
            url: http://localhost:3333
server:
  port: 9993
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:9999/eureka/
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always