spring:
  application:
    name: Config_Server
  cloud:
    config:
          server:
            native:
              search-locations: classpath:/config
  profiles:
    active: native
server:
  port: 2222
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:9999/eureka/